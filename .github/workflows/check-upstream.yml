name: Check Upstream Docs Changes

# 매주 월요일 오전 9시(KST) 자동 실행 + 수동 실행 가능
on:
  schedule:
    - cron: '0 0 * * 1'  # UTC 월요일 00:00 = KST 월요일 09:00
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone upstream docs
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /tmp/hermes-upstream

      - name: Compare and report changes
        run: |
          UPSTREAM_DOCS="/tmp/hermes-upstream/docs"
          REPORT=""
          CHANGED=false

          if [ ! -d "$UPSTREAM_DOCS" ]; then
            echo "⚠️ Upstream docs directory not found"
            exit 0
          fi

          # 새로운 파일 감지
          for f in $(find "$UPSTREAM_DOCS" -name "*.md" -o -name "*.mdx" 2>/dev/null); do
            relative="${f#$UPSTREAM_DOCS/}"
            REPORT="$REPORT\n📄 $relative ($(wc -l < "$f") lines)"
          done

          # 마지막 커밋 날짜 확인
          cd /tmp/hermes-upstream
          LAST_DOCS_COMMIT=$(git log -1 --format="%ci" -- docs/)
          LAST_DOCS_MSG=$(git log -1 --format="%s" -- docs/)

          echo "## 📊 Upstream Docs Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Last docs commit:** $LAST_DOCS_COMMIT" >> $GITHUB_STEP_SUMMARY
          echo "**Last commit message:** $LAST_DOCS_MSG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recent docs changes (last 10 commits):" >> $GITHUB_STEP_SUMMARY
          git log -10 --format="- %ci | %s" -- docs/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### All upstream doc files:" >> $GITHUB_STEP_SUMMARY
          echo -e "$REPORT" >> $GITHUB_STEP_SUMMARY

      - name: Create issue if docs changed recently
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // 최근 7일간 docs 변경 확인
            const result = execSync(
              'cd /tmp/hermes-upstream && git log --since="7 days ago" --format="%H %s" -- docs/',
              { encoding: 'utf-8' }
            ).trim();

            if (!result) {
              console.log('No upstream docs changes in last 7 days');
              return;
            }

            const commits = result.split('\n').map(line => `- ${line}`).join('\n');

            // 이미 열린 이슈 확인
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-update',
            });

            if (issues.length > 0) {
              // 기존 이슈에 코멘트 추가
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `## 🔄 새로운 upstream 변경 감지\n\n${commits}\n\n원본: https://github.com/NousResearch/hermes-agent/tree/main/docs`,
              });
            } else {
              // 새 이슈 생성
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔄 원본 Hermes Agent 문서 업데이트 감지',
                body: `## 원본 문서에 변경사항이 있습니다\n\n최근 7일간 변경된 커밋:\n${commits}\n\n### 확인 방법\n1. [원본 docs 확인](https://github.com/NousResearch/hermes-agent/tree/main/docs)\n2. 변경된 부분을 한국어 문서에 반영\n3. 이 이슈를 닫기\n\n원본 사이트: https://hermes-agent.nousresearch.com/docs`,
                labels: ['upstream-update'],
              });
            }
