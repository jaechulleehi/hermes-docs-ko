<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;width:1600px;height:900px;background:#09111e;color:#f5f9ff;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif}*{box-sizing:border-box}body{background:radial-gradient(circle at 82% 20%, rgba(125,211,252,.15), transparent 24%), linear-gradient(180deg,#08111d,#0f1c30)}.canvas{position:relative;width:100%;height:100%;padding:56px}.title{font-size:44px;font-weight:900;letter-spacing:-.03em}.subtitle{margin-top:12px;color:#cfe0ee;font-size:22px}.step{position:absolute;top:300px;width:240px;padding:24px;border-radius:24px;border:1px solid rgba(125,211,252,.18);background:rgba(10,18,33,.82);box-shadow:0 24px 40px rgba(0,0,0,.28)}.s1{left:60px}.s2{left:330px}.s3{left:600px;border-color:rgba(94,234,212,.35);background:rgba(15,28,48,.94)}.s4{left:870px}.s5{left:1140px}.num{font-size:18px;font-weight:800;color:#7dd3fc;letter-spacing:.08em}.head{margin-top:10px;font-size:24px;font-weight:900}.desc{margin-top:14px;font-size:18px;line-height:1.5;color:#d5e1ef}svg{position:absolute;inset:0;width:100%;height:100%}</style></head><body><div class="canvas"><div class="title">always-on 혼선을 줄이는 점검 순서</div><div class="subtitle">감각보다 관측성. 순서를 지키면 runtime 혼선이 훨씬 빨리 풀린다.</div><div class="step s1"><div class="num">1</div><div class="head">Process</div><div class="desc">실제 살아 있는 PID를 본다</div></div><div class="step s2"><div class="num">2</div><div class="head">Profile</div><div class="desc">누가 응답 중인지 본다</div></div><div class="step s3"><div class="num" style="color:#5eead4">3</div><div class="head">Status Gap</div><div class="desc">상태 출력과 실제를 분리한다</div></div><div class="step s4"><div class="num">4</div><div class="head">Autostart</div><div class="desc">재기동 원인을 찾는다</div></div><div class="step s5"><div class="num">5</div><div class="head">Heartbeat</div><div class="desc">출처를 확인한다</div></div><svg viewBox="0 0 1600 900"><path d="M300 420 C315 420, 320 420, 330 420" stroke="rg
