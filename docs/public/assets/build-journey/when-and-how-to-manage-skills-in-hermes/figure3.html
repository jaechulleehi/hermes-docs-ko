<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;width:1600px;height:900px;background:#09111e;color:#f5f9ff;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif}*{box-sizing:border-box}body{background:radial-gradient(circle at 16% 82%, rgba(94,234,212,.18), transparent 26%), linear-gradient(180deg,#08111d,#0f1c30)}.wrap{padding:56px}.title{font-size:44px;font-weight:900;letter-spacing:-.03em}.subtitle{margin-top:12px;color:#cfe0ee;font-size:22px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:44px}.card{border-radius:26px;border:1px solid rgba(125,211,252,.18);background:rgba(10,18,33,.82);padding:28px;box-shadow:0 24px 40px rgba(0,0,0,.28)}.head{font-size:28px;font-weight:900}.desc{margin-top:12px;font-size:20px;line-height:1.55;color:#d5e1ef}.tag{display:inline-block;margin-top:16px;padding:9px 13px;border-radius:999px;font-size:17px;border:1px solid rgba(125,211,252,.22);color:#7dd3fc;background:rgba(125,211,252,.08)}</style></head><body><div class="wrap"><div class="title">스킬이 부채가 되는 신호</div><div class="subtitle">추가보다 정리와 패치가 필요한 순간을 빨리 보는 게 중요하다.</div><div class="grid"><div class="card"><div class="head">겹치는 스킬이 많다</div><div class="desc">같은 일을 설명하는 스킬이 여러 개 생기면 구조가 흐려진다.</div><div class="tag">overlap</div></div><div class="card"><div class="head">경로와 명령이 오래됐다</div><div class="desc">실제 환경과 안 맞는 절차가 남아 있으면 잘못된 자동화가 된다.</div><div class="tag">stale steps</div></div><div class="card"><div class="head">wiki와 경계가 섞였다</div><div class="desc">설명 문서와 절차 문서의 역할이 섞이면 둘 다 약해진다.</div><div class="tag">boundary blur</div></div><div class="card"><div class="head">실사용에서 자꾸 예외가 늘어난다</div><div class="desc">그 순간은 새 스킬보다 패치·통합·정리가 필요한 신호다.</div><div class="tag">skill debt</div></div></div></body></html>
