<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;width:1600px;height:900px;background:#09111e;color:#f5f9ff;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif}*{box-sizing:border-box}body{background:radial-gradient(circle at 18% 16%, rgba(94,234,212,.18), transparent 26%), linear-gradient(180deg,#08111d,#0e1a2d)}.canvas{position:relative;width:100%;height:100%;padding:56px}.title{font-size:44px;font-weight:900;letter-spacing:-.03em}.subtitle{margin-top:12px;color:#cfe0ee;font-size:22px}.card{position:absolute;border-radius:26px;border:1px solid rgba(125,211,252,.18);background:rgba(10,18,33,.82);box-shadow:0 24px 40px rgba(0,0,0,.28)}.left{left:72px;top:220px;width:430px;padding:30px}.mid{left:585px;top:190px;width:430px;padding:32px;border-color:rgba(94,234,212,.35);background:rgba(15,28,48,.94)}.right{left:1095px;top:220px;width:430px;padding:30px}.label{font-size:18px;font-weight:800;color:#7dd3fc;letter-spacing:.08em}.head{margin-top:10px;font-size:28px;font-weight:900}.desc{margin-top:14px;font-size:20px;line-height:1.55;color:#d5e1ef}.pill{display:inline-block;margin-top:16px;padding:10px 14px;border-radius:999px;background:rgba(125,211,252,.1);border:1px solid rgba(125,211,252,.24);font-size:18px;color:#7dd3fc}svg{position:absolute;inset:0;width:100%;height:100%}</style></head><body><div class="canvas"><div class="title">혼선의 원인은 봇 수보다 응답 조건이다</div><div class="subtitle">같은 스레드에서 누가 언제 답해야 하는지 예측 불가해지는 순간 피로가 커진다.</div><div class="card left"><div class="label">NO RULE</div><div class="head">자유응답이 겹친다</div><div class="desc">여러 봇이 동시에 자기 몫이라고 생각하면 결과가 섞이고 사용자는 지친다.</div><div class="pill">noise grows</div></div><div class="card mid"><div class="label" style="color:#5eead4">CALLING RULE</div><div class="head">누가 언제 말하는지 선명하게</div><div class="desc">기대와 주도권을 사용자 쪽에 남겨두는 쪽이 훨씬 안정적이다.</div><div class="pill" style="border-color:rgba(94,234,212,.28);color:#5eead4;background:rgba(94,234,212,.1)">
