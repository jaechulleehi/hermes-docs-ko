<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;width:1600px;height:900px;background:#09111e;color:#f5f9ff;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Segoe UI',sans-serif}*{box-sizing:border-box}body{background:radial-gradient(circle at 16% 82%, rgba(94,234,212,.18), transparent 26%), linear-gradient(180deg,#08111d,#0f1c30)}.wrap{padding:56px}.title{font-size:44px;font-weight:900;letter-spacing:-.03em}.subtitle{margin-top:12px;color:#cfe0ee;font-size:22px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:44px}.card{border-radius:26px;border:1px solid rgba(125,211,252,.18);background:rgba(10,18,33,.82);padding:28px;box-shadow:0 24px 40px rgba(0,0,0,.28)}.head{font-size:28px;font-weight:900}.desc{margin-top:12px;font-size:20px;line-height:1.55;color:#d5e1ef}.tag{display:inline-block;margin-top:16px;padding:9px 13px;border-radius:999px;font-size:17px;border:1px solid rgba(125,211,252,.22);color:#7dd3fc;background:rgba(125,211,252,.08)}</style></head><body><div class="wrap"><div class="title">운영 기준을 네 칸으로 압축한다</div><div class="subtitle">세부 설명은 길어도 되지만, 핵심 운영 기준은 짧고 스캔 가능해야 한다.</div><div class="grid"><div class="card"><div class="head">오해</div><div class="desc">처음에 자연스럽게 잘못 보는 지점</div><div class="tag">misread</div></div><div class="card"><div class="head">실제 구조</div><div class="desc">지금 기준으로 봐야 할 층과 경계</div><div class="tag">structure</div></div><div class="card"><div class="head">판단 기준</div><div class="desc">무엇을 먼저 보고 무엇을 나중에 볼지</div><div class="tag">decision rule</div></div><div class="card"><div class="head">다음 액션</div><div class="desc">실제로 무엇을 바꾸고 무엇을 남길지</div><div class="tag">next move</div></div></div></body></html>
